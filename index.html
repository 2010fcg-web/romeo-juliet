<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Podcast From The Friar's Cell</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="background"></div>

<div id="overlay"></div>

<div id="game">

<header>

<h1>🎙️ Podcast From The Friar's Cell</h1>

<p class="subtitle">
An Interactive Story Based on Romeo and Juliet
</p>

</header>

<div id="scene">

<img id="character" src="images/friar.png" alt="Friar Laurence">

<div id="dialogueBox">

<h2 id="speaker">
Friar Laurence
</h2>

<p id="dialogue">

Welcome...

My name is Friar Laurence.

Some know me as the priest from Romeo and Juliet.

But for me...

It wasn't just a story.

It was my life.

</p>

</div>

</div>

<div id="choices">

<button id="nextButton">
Begin Story
</button>

</div>

<div id="stats">

<div class="bar">

Hope

<div id="hopeFill"></div>

</div>

<div class="bar">

Conflict

<div id="conflictFill"></div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
